# Helm values for kube-prometheus-stack
# Install: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#          helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
#            -n monitoring --create-namespace \
#            -f infra/monitoring/kube-prometheus-stack-values.yaml

grafana:
  enabled: true
  adminPassword: "changeme"   # override with a secret in CI/CD
  ingress:
    enabled: false            # expose via port-forward or set a real host
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

prometheus:
  enabled: true
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
    # Scrape all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
