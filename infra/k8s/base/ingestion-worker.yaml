apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-worker
  namespace: rag-us-law
  labels:
    app: ingestion-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-worker
  template:
    metadata:
      labels:
        app: ingestion-worker
    spec:
      containers:
        - name: ingestion-worker
          image: ingestion-worker:latest
          envFrom:
            - secretRef:
                name: ingestion-worker-secret
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
