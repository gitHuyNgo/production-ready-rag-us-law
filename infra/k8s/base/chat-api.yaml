apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-api
  namespace: rag-us-law
  labels:
    app: chat-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-api
  template:
    metadata:
      labels:
        app: chat-api
    spec:
      containers:
        - name: chat-api
          image: chat-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: chat-api-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: chat-api
  namespace: rag-us-law
spec:
  selector:
    app: chat-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
