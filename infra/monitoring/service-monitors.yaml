# ServiceMonitors tell Prometheus which services to scrape.
# Each FastAPI service should expose GET /metrics (add prometheus-fastapi-instrumentator).
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-gateway
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - rag-us-law
  selector:
    matchLabels:
      app: api-gateway
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
