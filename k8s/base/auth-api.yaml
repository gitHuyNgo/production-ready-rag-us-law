apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api
  namespace: rag-us-law
  labels:
    app: auth-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-api
  template:
    metadata:
      labels:
        app: auth-api
    spec:
      containers:
        - name: auth-api
          image: auth-api:latest
          ports:
            - containerPort: 8001
          envFrom:
            - secretRef:
                name: auth-api-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-api
  namespace: rag-us-law
spec:
  selector:
    app: auth-api
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
