apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-us-law-ingress
  namespace: rag-us-law
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Uncomment to enable TLS via cert-manager
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # tls:
  #   - hosts:
  #       - yourdomain.com
  #     secretName: rag-us-law-tls
  rules:
    - host: yourdomain.com
      http:
        paths:
          # Frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          # API traffic routed through the gateway
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
