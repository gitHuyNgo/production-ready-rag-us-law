name: API Gateway CI

on:
  push:
    paths:
      - "app/api-gateway/**"
      - ".github/workflows/api_gateway_ci.yaml"
  pull_request:
    branches: [main]
    paths:
      - "app/api-gateway/**"
      - ".github/workflows/api_gateway_ci.yaml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install api-gateway dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/api-gateway/requirements.txt

      - name: Run api-gateway tests
        working-directory: app/api-gateway
        env:
          PYTHONPATH: .
        run: pytest

  build-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image repo and tag
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "IMAGE_TAG=pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api-gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app/api-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/api-gateway:${{ github.sha }}
            ghcr.io/${{ env.REPO_LOWER }}/api-gateway:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
