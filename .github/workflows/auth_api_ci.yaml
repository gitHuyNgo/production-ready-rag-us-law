name: Auth API CI

on:
  push:
    paths:
      - "app/auth-api/**"
      - ".github/workflows/auth_api_ci.yaml"
  pull_request:
    branches: [main]
    paths:
      - "app/auth-api/**"
      - ".github/workflows/auth_api_ci.yaml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared lib
        run: |
          python -m pip install --upgrade pip
          pip install -e libs/code-shared

      - name: Install auth-api dependencies
        run: pip install -r app/auth-api/requirements.txt

      - name: Generate test JWT keys
        run: |
          mkdir -p app/auth-api/tests/fixtures
          openssl genrsa -out app/auth-api/tests/fixtures/rsa_private.pem 2048
          openssl rsa -in app/auth-api/tests/fixtures/rsa_private.pem -pubout -out app/auth-api/tests/fixtures/rsa_public.pem

      - name: Run auth-api tests
        working-directory: app/auth-api
        env:
          PYTHONPATH: .
        run: pytest

  build-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image repo and tag
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "IMAGE_TAG=pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app/auth-api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/auth-api:${{ github.sha }}
            ghcr.io/${{ env.REPO_LOWER }}/auth-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

