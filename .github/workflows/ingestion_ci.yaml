name: Ingestion Worker CI

on:
  push:
    paths:
      - "libs/**"
      - "app/ingestion-worker/**"
      - ".github/workflows/ingestion_ci.yaml"
  pull_request:
    branches: [main]
    paths:
      - "libs/**"
      - "app/ingestion-worker/**"
      - ".github/workflows/ingestion_ci.yaml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Project Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared lib
        run: |
          python -m pip install --upgrade pip
          pip install -e libs/code-shared

      - name: Install ingestion-worker dependencies
        run: |
          pip install -r app/ingestion-worker/requirements.txt

      - name: Run ingestion-worker tests
        working-directory: app/ingestion-worker
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PYTHONPATH: .
        run: make test

  build-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image repo and tag
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "IMAGE_TAG=pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ingestion-worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app/ingestion-worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/ingestion-worker:${{ github.sha }}
            ghcr.io/${{ env.REPO_LOWER }}/ingestion-worker:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
